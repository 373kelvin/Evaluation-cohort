services:
  eval-cohort:
    build:
      context: .
      dockerfile: Dockerfile
    image: eval-cohort:local
    container_name: eval-cohort
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PUBLIC_BASE_URL: "http://127.0.0.1:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/eval-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped
